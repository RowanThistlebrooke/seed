<!DOCTYPE html>
<html lang="en" style="background: #050807; color-scheme: dark;">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#04060a" />
<title>Main Dashboard</title>

<!--
  The Vitality dashboard shell, pulled to one file.
  Ported: app/app/Dashboard.tsx (shell only), app/app/DashboardHeader.tsx,
  app/app/DashboardHeaderGem.tsx (fallback path), components/WelcomeBackdrop.tsx.
  CSS extracted with postcss from dashboard.module.css, dashboardHeaderGem.module.css,
  WelcomeBackdrop.module.css; :root + reset verbatim from app/globals.css.
  Deliberately absent: the setup pill, the profile avatar, the settings gear,
  Customize, and the whole DashboardGrid.
-->

<!-- Fonts layout.tsx loads via next/font/google. The shell uses --font-inter
     (body) and --font-serif (the greeting). Hanken Grotesk + JetBrains Mono are
     loaded by layout.tsx but no shell element references them, so they are not
     pulled here. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<style>
/* next/font exposes each face as a CSS variable on <html>. Same variables,
   same faces, resolved to the Google Fonts families above. */
:root {
  --font-inter: 'Inter';
  --font-serif: 'Instrument Serif';
}

/* ===== app/globals.css — :root, verbatim ===== */
:root {
  /* Colors */
  --bg: #000000;
  --bg-elevated: #0a0a0a;
  --fg: #ffffff;
  --mint: #6EE7B7;
  --mint-hover: #5dd6a6;
  --mint-deep: #1f4d3d;       /* dark teal partner to mint */
  --mint-glow: rgba(110, 231, 183, 0.4);
  --mint-ink: #042a1c;        /* dark foreground for text/icons on a mint fill */
  --amber: #F59E0B;
  --amber-warm: #d97706;      /* deeper amber for duotone gradients */
  --wine: #7c2d12;            /* deep red-brown, partners with amber */
  --red: #EF4444;
  --muted: rgba(255, 255, 255, 0.5);
  --muted-strong: rgba(255, 255, 255, 0.7);
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.16);
  --card: rgba(255, 255, 255, 0.02);
  --card-elevated: rgba(255, 255, 255, 0.04);

  /* Spacing */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 999px;

  /* Type */
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.375rem;
  --text-2xl: 1.75rem;
  --text-3xl: 2.5rem;

  /* Motion */
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);   /* the signature easing */
  --ease-out-soft: cubic-bezier(0.32, 0.72, 0, 1); /* smooth lift / float */
  --duration-fast: 120ms;
  --duration: 180ms;
  --duration-lift: 480ms;
}

/* ===== app/globals.css — reset + html/body, verbatim ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  /* Kill the grey/blue tap flash Safari paints over buttons & links on touch. */
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  /* Rubber-band / overscroll past the top of any page must show the app's
     near-black, never a pure-black band. Tint the root the editorial
     atmosphere's darkest stop (#04060a) so the reveal is seamless, and damp the
     bounce so it barely shows at all. body keeps var(--bg) below. */
  background: #04060a;
  overscroll-behavior-y: none;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-inter), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: var(--text-base);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  /* Retint every native control accent (form widgets, iOS cursor/selection
     grab-handles) to the brand mint so nothing renders the OS default blue. */
  accent-color: var(--mint);
}

::selection {
  background: rgba(110, 231, 183, 0.25);
}
::-moz-selection {
  background: rgba(110, 231, 183, 0.25);
}

:focus-visible {
  outline: 2px solid rgba(110, 231, 183, 0.65);
  outline-offset: 2px;
}

body {
  -webkit-user-select: none;
  -moz-user-select: none;
  user-select: none;
}

/* ===== app/globals.css — .grain-overlay, verbatim ===== */
.grain-overlay {
  position: relative;
}
.grain-overlay::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.035;
  /* no mix-blend-mode: a blended fixed layer forces the compositor to
     re-blend the whole page every scroll frame on mobile; at 3.5% opacity
     the plain texture reads the same */
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size: 200px 200px;
}

/* ===== app/app/dashboard.module.css — postcss-extracted ===== */
.page {
  position: relative;
  min-height: 100vh;
  /* viewportFit:cover + black-translucent status bar means the page paints
     under the notch / Dynamic Island and the home indicator. Pad the top and
     bottom by the safe-area insets so the greeting clears the status bar and
     the last tile clears the home indicator on iPhone. Insets are 0 on
     desktop, so this is a no-op there. */
  padding: calc(var(--space-10) + env(safe-area-inset-top)) var(--space-6)
    calc(var(--space-16) + env(safe-area-inset-bottom));
  overflow: hidden;
}

.page::before {
  content: '';
  position: absolute;
  inset: -10% -5%;
  background:
    radial-gradient(ellipse 50% 35% at 70% 20%, rgba(110, 231, 183, 0.06), transparent 65%),
    radial-gradient(ellipse 40% 30% at 20% 80%, rgba(110, 231, 183, 0.04), transparent 70%);
  pointer-events: none;
  animation: canvasDrift 60s ease-in-out infinite alternate;
  z-index: 0;
}

.shell {
  position: relative;
  /* Lifts content above the fixed WelcomeBackdrop layers (aurora/mountains/
     particles sit at z 0-2) so tiles and greeting stay in front. */
  z-index: 5;
  max-width: 1180px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: var(--space-10);
}

/* ===== The tile grid =====
   Vitality's own grid (.gridConsolidated) is a hand-placed 6-tile
   grid-template-areas map. Named areas cannot drive a registry that does not
   know its tiles ahead of time, so the AREAS are not ported. Its MEASUREMENTS
   are, exactly: 4 columns, rows minmax(160px, 200px), gap --space-4; at 980px
   two columns and grid-auto-rows minmax(160px, auto); at 560px gap --space-3
   and minmax(150px, auto). Tiles span by size instead of being named.

   [hidden] is why an empty board is still the seed: no tiles, no grid, no gap,
   nothing on screen but the gem, the name and the date. */
.tileGrid {
  /* components/veeTiles.css .grid, verbatim measurements: the LIVE dashboard's
     customizable grid (18px gap, row clamp), not the older consolidated grid
     (160-200px rows) this shell first shipped with - that one made every tile
     taller than the real app and the poster art read small and lost. */
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: clamp(118px, 13.5vw, 160px);
  gap: 18px;
}

.tileGrid[hidden] { display: none; }

.tile {
  /* --cols/--rows come from SIZE_PRESETS in host.js. min-width:0 stops a wide
     tile's content forcing its column past 1fr and shoving the grid sideways.
     Visuals: veeTiles.css .tile verbatim - translucent glass the world glows
     through, mint-tinted border, soft top highlight + drop shadow. */
  grid-column: span var(--cols, 2);
  grid-row: span var(--rows, 1);
  min-width: 0;
  border: 1px solid rgba(167, 243, 208, .10);
  background: linear-gradient(165deg, rgba(16, 26, 22, .55) 0%, rgba(7, 12, 10, .40) 100%);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05), 0 22px 50px -30px rgba(0, 0, 0, .75);
  border-radius: 20px;
  overflow: hidden;
}

.tileFrame {
  display: block;
  width: 100%;
  height: 100%;
  border: 0;
  background: transparent;
  /* color-scheme:normal, deliberately. The tile spec forbids a tile declaring
     color-scheme because a dark declaration makes the browser paint an opaque
     white canvas behind it. <html> here sets color-scheme:dark, which iframes
     inherit, so it is neutralised at the frame instead. */
  color-scheme: normal;
}

/* veeTiles.css: phone = 2 cols at 760px, taller rows. A 3-or-4-wide tile
   cannot fit 2 columns; clamp instead of letting it overflow the grid. */
@media (max-width: 760px) {
  .tileGrid {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: max(124px, 30vw);
  }
  .tile { grid-column: span min(var(--cols, 2), 2); }
}

.header {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  opacity: 0;
  animation: fadeUp 700ms var(--ease-premium) forwards;
}

.greeting {
  font-family: var(--font-serif), 'Times New Roman', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  /* --greet-scale (default 1) lets the user size their greeting; the font stays
     Instrument Serif italic, the unified voice. */
  font-size: calc(clamp(2.25rem, 4.5vw, 3.25rem) * var(--greet-scale, 1));
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--fg);
  /* greeting text mounts client-side; reserve its line so the header never
     grows a frame after mount (CLS on every /app open) */
  min-height: 1.2em;
}

.greetingName {
  font-style: italic;
  /* the accented name follows the chosen wallpaper accent (mint by default) */
  color: var(--wall-accent, var(--mint));
}

.date {
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  /* same reservation as .greeting: date text mounts client-side */
  min-height: 1.5em;
}

@media (max-width: 560px) {
  .page {
    padding: calc(var(--space-8) + env(safe-area-inset-top)) var(--space-4)
      calc(var(--space-12) + env(safe-area-inset-bottom));
  }
}

@media (prefers-reduced-motion: reduce) {
  .header, .page::before {
    animation: none !important;
  }
}

.headerRow {
  display: flex;
  align-items: center;
  gap: var(--space-6);
}

.headerGem {
  flex: 0 0 auto;
  width: 180px;
  height: 180px;
}

@media (max-width: 980px) {
  .headerGem {
    width: 140px;
    height: 140px;
  }
}

@media (max-width: 560px) {
  .headerRow {
    gap: var(--space-4);
  }
  .headerGem {
    width: 100px;
    height: 100px;
  }
  .header {
    min-width: 0;
  }
  .greeting {
    font-size: clamp(1.85rem, 7vw, 2.3rem);
  }
}

@media (min-width: 981px) and (min-height: 761px) {
  .page.oneScreen {
    padding-top: var(--space-8);
    padding-bottom: var(--space-8);
  }
  .oneScreen .shell {
    width: 100%;
    gap: var(--space-6);
  }
}

.gw { display: inline-block; }

.greetReveal .gw {
  opacity: 0;
  animation: greetWordIn 0.85s var(--ease-premium) both;
  animation-delay: var(--d, 0s);
  will-change: transform, opacity, filter;
}

@media (prefers-reduced-motion: reduce) {
  .greetReveal .gw {
    animation: entRmFade 0.4s ease both;
    animation-delay: 0ms;
  }
}

@keyframes canvasDrift {
  from { transform: translate3d(0, 0, 0); }
  to   { transform: translate3d(-2%, 1%, 0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes greetWordIn {
  from { opacity: 0; transform: translateY(14px); filter: blur(6px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

@keyframes entRmFade {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===== app/app/dashboardHeaderGem.module.css — postcss-extracted ===== */
.gemStage {
  position: relative;
  flex-shrink: 0;
  /* Fill the container by default. When the component is used standalone it
     sets an inline width/height; when used on the dashboard the .headerGem
     container owns the size (responsive across breakpoints) and the stage
     simply fills it. */
  width: 100%;
  height: 100%;
  transform-origin: center;
  z-index: 2;
  animation: dashgem-halo 3.9s ease-in-out infinite;
}
@media (prefers-reduced-motion: reduce) {
  .gemStage {
    animation: none;
    filter: drop-shadow(0 0 36px rgba(110, 231, 183, 0.14))
            drop-shadow(0 0 80px rgba(110, 231, 183, 0.06));
  }
}
.gemFallback {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(110, 231, 183, 0.18) 0%, rgba(110, 231, 183, 0) 70%);
  animation: dashgem-breathe 3.2s ease-in-out infinite;
}
@keyframes dashgem-halo {
  0%, 100% {
    filter: drop-shadow(0 0 30px rgba(110, 231, 183, 0.12))
            drop-shadow(0 0 70px rgba(110, 231, 183, 0.05));
  }
  50% {
    filter: drop-shadow(0 0 55px rgba(110, 231, 183, 0.22))
            drop-shadow(0 0 120px rgba(110, 231, 183, 0.12));
  }
}
@keyframes dashgem-breathe {
  0%, 100% { opacity: 0.5; transform: scale(0.96); }
  50%      { opacity: 1;   transform: scale(1); }
}

/* ===== components/WelcomeBackdrop.module.css — postcss-extracted ===== */
.atmosphere {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  /* The aurora wash tints to --wall-accent (the chosen World accent), so changing
     the wallpaper color re-themes the whole glow. Falls back to mint. */
  background-image:
    radial-gradient(60% 50% at 50% 30%,
      color-mix(in srgb, var(--wall-accent, #6EE7B7) 16%, transparent) 0%,
      color-mix(in srgb, var(--wall-accent, #6EE7B7) 6%, transparent) 32%,
      transparent 65%),
    radial-gradient(28% 22% at 50% 38%, rgba(255, 226, 181, 0.07) 0%, rgba(255, 226, 181, 0) 70%),
    radial-gradient(120% 80% at 50% 100%, rgba(14, 38, 30, 0.5) 0%, rgba(4, 6, 10, 0.95) 75%);
  background-repeat: no-repeat;
  background-size: 100% 100%;
}

.mountainsLayer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1;
  height: 30vh;
  min-height: 180px;
  pointer-events: none;
  opacity: 0.8;
}

.mountainsLayer svg {
  width: 100%;
  height: 100%;
  display: block;
}

.particles {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

.particles span {
  position: absolute;
  width: 1.5px;
  height: 1.5px;
  background: rgba(233, 239, 233, 0.7);
  border-radius: 50%;
  animation: welcome-backdrop-drift linear infinite;
  /* particle glow tints to the chosen accent too */
  box-shadow: 0 0 6px color-mix(in srgb, var(--wall-accent, #a7f3d0) 55%, transparent);
}

@media (prefers-reduced-motion: reduce) {
  .particles span { animation: none; }
}

@keyframes welcome-backdrop-drift {
  0%   { transform: translate3d(0, 0, 0); opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.55; }
  100% { transform: translate3d(var(--dx, 12px), var(--dy, -100vh), 0); opacity: 0; }
}
</style>
</head>
<body>

<!-- Dashboard.tsx: <main className={`${styles.page} ${styles.oneScreen} grain-overlay`}
     style={{ '--wall-accent': wallAccent }}>. No data-entrance: that attribute
     only drives tile entrances, and there are no tiles here. -->
<main class="page oneScreen grain-overlay" style="--wall-accent: #6EE7B7" id="page">

  <!-- WelcomeBackdrop, world mode. Fixed layers at z 0/1/2. -->
  <div style="--wall-accent: #6EE7B7">
    <div class="atmosphere" aria-hidden="true"></div>
    <div class="mountainsLayer" aria-hidden="true">
      <svg viewBox="0 0 1600 420" preserveAspectRatio="none">
        <defs>
          <linearGradient id="welcome-backdrop-mt-far" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0d1a17" stop-opacity="0" />
            <stop offset="55%" stop-color="#0d1a17" stop-opacity=".55" />
            <stop offset="100%" stop-color="#0d1a17" stop-opacity=".95" />
          </linearGradient>
          <linearGradient id="welcome-backdrop-mt-near" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#050a09" stop-opacity=".4" />
            <stop offset="60%" stop-color="#050a09" stop-opacity=".95" />
            <stop offset="100%" stop-color="#050a09" stop-opacity="1" />
          </linearGradient>
        </defs>
        <path d="M0,300 L120,230 L210,260 L320,180 L430,220 L560,150 L680,210 L820,170 L960,220 L1100,180 L1240,240 L1380,200 L1500,250 L1600,220 L1600,420 L0,420 Z" fill="url(#welcome-backdrop-mt-far)" />
        <path d="M0,360 L100,320 L220,340 L340,290 L460,330 L590,300 L720,340 L860,310 L1000,350 L1140,310 L1280,355 L1420,320 L1540,360 L1600,340 L1600,420 L0,420 Z" fill="url(#welcome-backdrop-mt-near)" />
      </svg>
    </div>
    <div class="particles" id="particles" aria-hidden="true"></div>
  </div>

  <div class="shell">
    <div class="headerRow">
      <!-- DashboardHeaderGem className={styles.headerGem}. The non-button branch
           of Dashboard.tsx (showGem, no I'm-home ritual): the gem renders, but
           there is no Homecoming behind it to open. -->
      <div class="headerGem" style="pointer-events: none" aria-hidden="true">
        <div class="gemStage">
          <!-- HeroCrystal is Three.js and is not ported. This is the component's
               OWN dynamic-import loading fallback (styles.gemFallback), not a
               hand-rolled gem. -->
          <div class="gemFallback" aria-hidden="true"></div>
        </div>
      </div>

      <!-- DashboardHeader -->
      <div class="header" id="header" style="--greet-scale: 1">
        <h1 class="greeting greetReveal" id="greeting"></h1>
        <p class="date" id="date"></p>
      </div>
    </div>

    <!-- The board. Empty until the registry has a tile, and [hidden] until
         then, so a fresh seed is the shell and nothing else. host.js fills it. -->
    <div class="tileGrid" id="tileGrid" hidden></div>
  </div>

</main>

<!-- Who this board belongs to. Loaded before the boot script so the greeting
     can read it. The mentor writes this file the moment they say their name. -->
<script src="lib/site.js"></script>

<script>
// ── The host contract. Host present, it uses the dashboard's store. No host,
//    localStorage, and the shell still runs.
if (!window.Vitality) { window.Vitality = {
  save: d => { try{localStorage.setItem('v:shell',JSON.stringify(d))}catch(e){} return Promise.resolve(true) },
  load: () => { try{ return Promise.resolve(JSON.parse(localStorage.getItem('v:shell')||'{}')) }catch(e){ return Promise.resolve({}) } } } }

// ── lib/tiles/dashboardChrome.ts — DEFAULT_CHROME, verbatim (the fields the
//    shell reads).
var DEFAULT_CHROME = {
  background: { mode: 'world', accent: '#6EE7B7', particles: 24, mountains: true, speed: 1 },
  greeting: { mode: 'auto', text: '', showName: true, accentName: true, scale: 1 },
  date: { show: true, format: 'full' },
  gem: { show: true, tint: 'mint' }
}

// The board pins the line to "Welcome back" through the component's own
// custom-greeting path. The shipped default is mode:'auto' (the random pool
// below); set CHROME = DEFAULT_CHROME to get that behaviour back.
var CHROME = {
  background: DEFAULT_CHROME.background,
  greeting: { mode: 'custom', text: 'Welcome back', showName: true, accentName: true, scale: 1 },
  date: DEFAULT_CHROME.date,
  gem: DEFAULT_CHROME.gem
}

// ── DashboardHeader.tsx — the auto greeting pool, verbatim.
var GREETINGS = [
  { text: 'Howdy', punct: '' },
  { text: "How's it going", punct: '?' },
  { text: 'Welcome back', punct: '' },
  { text: 'Good to see you', punct: '' },
  { text: 'Morning', punct: '' },
  { text: "Let's get after it", punct: '' }
]

function pickGreeting() {
  var pool = new Date().getHours() < 12 ? GREETINGS : GREETINGS.filter(function (g) { return g.text !== 'Morning' })
  var i = Math.floor(Math.random() * pool.length)
  try {
    var last = window.sessionStorage.getItem('vitality:greet-last')
    if (pool.length > 1 && pool[i].text === last) i = (i + 1) % pool.length
    window.sessionStorage.setItem('vitality:greet-last', pool[i].text)
  } catch (e) {
    /* storage unavailable: any pick works */
  }
  return pool[i]
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
}

// ── DashboardHeader render, mirrored from the JSX.
function renderHeader(firstName) {
  var g = CHROME.greeting
  var d = CHROME.date
  var auto = pickGreeting()
  var now = new Date()
  var fullDate = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
  var todayDate = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })

  // Custom wording falls back to the randomized auto line if blank (never render empty).
  var custom = g.mode === 'custom' && g.text.trim() ? g.text.trim() : null
  var word = custom !== null ? custom : auto.text
  var punct = custom ? '' : auto.punct
  var includesName = !!(firstName && word.toLowerCase().indexOf(String(firstName).toLowerCase()) !== -1)
  var renderName = !!(g.showName && firstName && !includesName)
  var dateText = d.format === 'today' ? todayDate : fullDate

  var words = word ? word.split(' ') : []
  var dly = function (i) { return '--d: ' + (0.05 + i * 0.09).toFixed(2) + 's' }

  var html = ''
  for (var i = 0; i < words.length; i++) {
    if (i > 0) html += ' '
    html += '<span class="gw" style="' + dly(i) + '">' + esc(words[i]) +
      (!renderName && i === words.length - 1 ? esc(punct) : '') + '</span>'
  }
  if (renderName) {
    html += '<span class="gw" style="' + dly(words.length) + '">' +
      ',&nbsp;<span class="' + (g.accentName ? 'greetingName' : '') + '">' + esc(firstName) + '</span>' +
      esc(punct) + '</span>'
  }

  document.getElementById('greeting').innerHTML = html
  document.getElementById('header').style.setProperty('--greet-scale', g.scale)
  var dateEl = document.getElementById('date')
  // {d.show && <p className={styles.date}>{dateText}</p>}
  if (d.show) dateEl.textContent = dateText
  else dateEl.remove()
}

// ── WelcomeBackdrop.tsx — the drifting particle field, verbatim.
function renderParticles() {
  var bg = CHROME.background
  var root = document.getElementById('particles')
  if (!root) return
  root.innerHTML = ''
  var world = bg.mode === 'world' ? bg : null
  var count = world ? world.particles : 0
  var speed = world ? world.speed : 1
  if (count <= 0) return
  var N = window.innerWidth < 640 ? Math.round(count * 0.6) : count
  for (var i = 0; i < N; i++) {
    var s = document.createElement('span')
    s.style.left = Math.random() * 100 + '%'
    s.style.top = 60 + Math.random() * 40 + '%'
    var size = 1.2 + Math.random() * 1.2
    s.style.width = s.style.height = size + 'px'
    var dur = (22 + Math.random() * 28) / Math.max(0.2, speed)
    s.style.animationDuration = dur + 's'
    s.style.animationDelay = -Math.random() * dur + 's'
    s.style.setProperty('--dx', Math.random() * 30 - 15 + 'px')
    s.style.setProperty('--dy', -(60 + Math.random() * 50) + 'vh')
    root.appendChild(s)
  }
}

// ── Boot. The name: the store first (a later episode's in-app profile), then
//    lib/site.js, the file the mentor writes the moment they say their name.
//    No name at all means DashboardHeader's renderName is false and the
//    greeting simply renders without one.
var siteName = (window.SITE && typeof window.SITE.name === 'string' && window.SITE.name.trim()) || null
window.Vitality.load().then(function (data) {
  var name = (data && data.name) || siteName
  renderHeader(name)
  renderParticles()
}).catch(function () {
  renderHeader(siteName)
  renderParticles()
})
</script>

     registry.js is the ONE file that changes when a tile is added. -->
<script src="lib/tiles/registry.js"></script>
<script src="lib/tiles/host.js"></script>
